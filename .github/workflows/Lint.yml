name: Lint

jobs:
  lint:
    strategy:
      fail-fast: false
      matrix:
        ruby: [2.7]
        os: [ubuntu-24.04]

    name: Lint
    runs-on: ${{ matrix.os }}
    env:
      COCOAPODS_CI_TASKS: LINT
    steps:
      - name: Set build image var
        run: echo "ImageVersion=$ImageVersion"  >> $GITHUB_ENV

      - name: Checkout git
        uses: actions/checkout@v1

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}

      - uses: actions/cache/restore@v4
        id: bundle-cache-restore
        with:
          path: vendor/bundle
          key: gems@v1-${{ matrix.os }}-${{ env.ImageVersion }}-Ruby${{ matrix.ruby }}-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            gems@v1-${{ matrix.os }}-${{ env.ImageVersion }}-Ruby${{ matrix.ruby }}-
      - name: Run bundle install
        run: |
          bundle config path vendor/bundle
          bundle config set without 'debugging documentation'
          bundle install --jobs 4 --retry 3

      - name: Run Tests
        run: bundle exec rake spec:all

      - uses: actions/cache/save@v4
        id: bundle-cache-save
        with:
          path: vendor/bundle
          key: ${{ steps.bundle-cache-restore.outputs.cache-primary-key }}

on:
  push:
    branches:
      - "master"
      - "*-stable"
  pull_request:
    branches:
      - master
      - "*-stable"

