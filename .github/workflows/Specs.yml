name: Specs




jobs:
  specs:
    strategy:
      fail-fast: false
      matrix:
        task: [SPECS]
        ruby: [2.6, 2.7, 3.0]
        os: [ubuntu-24.04]
        include:
          - task: SPECS
            os: macos-latest
            ruby: system
          - task: EXAMPLES
            os: macos-15
            ruby: system

    name: ${{ matrix.task }} / ${{ matrix.os }} / Ruby ${{ matrix.ruby }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Set build image var
        run: echo "ImageVersion=$ImageVersion"  >> $GITHUB_ENV

      - name: Checkout git
        uses: actions/checkout@v1

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        if: ${{ matrix.ruby != 'system' }}
        with:
          ruby-version: ${{ matrix.ruby }}

      # 'system' means Apple's /usr/bin/ruby, NOT the Homebrew Ruby that the
      # GitHub macOS images put first on PATH. Overwrite PATH with the stock
      # system directories so none of the image's preinstalled rubies can
      # shadow /usr/bin/ruby. Apple's default gem home is not writable, so
      # gems go to ~/.gem (whose bin dir leads the stubbed PATH).
      - name: Use Apple system Ruby
        if: ${{ matrix.ruby == 'system' }}
        run: |
          echo "GEM_HOME=$HOME/.gem" >> $GITHUB_ENV
          echo "PATH=$HOME/.gem/bin:/usr/bin:/bin:/usr/sbin:/sbin" >> $GITHUB_ENV

      - name: Verify system Ruby
        if: ${{ matrix.ruby == 'system' }}
        run: |
          ruby --version
          if [ "$(which ruby)" != "/usr/bin/ruby" ]; then
            echo "::error::Expected /usr/bin/ruby, got $(which ruby) ($(ruby --version))"
            exit 1
          fi

      - name: Update git submodules
        run: git submodule update --init

      - uses: actions/cache/restore@v4
        id: bundle-cache-restore
        with:
          path: vendor/bundle
          key: gems@v2-${{ matrix.os }}-${{ env.ImageVersion }}-Ruby${{ matrix.ruby }}-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            gems@v2-${{ matrix.os }}-${{ env.ImageVersion }}-Ruby${{ matrix.ruby }}-
      - name: Run bundle install
        run: |
          # Match the Gemfile.lock BUNDLED WITH version; 2.3.26 supports all
          # matrix Rubies (>= 2.6). For 'system', /usr/bin/gem pins the
          # binstub to Apple's Ruby.
          if [ "${{ matrix.ruby }}" = "system" ]; then
            /usr/bin/gem install bundler -v 2.3.26
          else
            gem install bundler -v 2.3.26
          fi
          bundle config path vendor/bundle
          bundle config set without 'debugging documentation'
          bundle install --jobs 4 --retry 3
      - uses: actions/cache/save@v4
        id: bundle-cache-save
        with:
          path: vendor/bundle
          key: ${{ steps.bundle-cache-restore.outputs.cache-primary-key }}
      - name: Set up git identity
        run: |
          git config --global user.email "tests@cocoapods.org"
          git config --global user.name "CocoaPods Tests"

      - uses: maxim-lobanov/setup-xcode@v1
        if: ${{ matrix.task == 'EXAMPLES' }}
        with:
          xcode-version: 16.4

      - name: Run Tests
        run: bundle exec rake spec:all
        env:
          COCOAPODS_CI_TASKS: ${{ matrix.task }}
          GENERATE_COVERAGE: ${{ matrix.coverage }}

on:
  push:
    branches:
      - "master"
      - "*-stable"
  pull_request:
    branches:
      - master
      - "*-stable"
